<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IGOpen — Make Instagram links open in Safari & Chrome</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0f1e; color: #fff; min-height: 100vh; }
    .hero { text-align: center; padding: 80px 24px 60px; }
    .badge { display: inline-block; background: rgba(245,166,35,0.15); color: #f5a623; font-size: 13px; padding: 6px 14px; border-radius: 20px; margin-bottom: 24px; border: 1px solid rgba(245,166,35,0.3); }
    h1 { font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 700; line-height: 1.2; margin-bottom: 16px; }
    h1 span { color: #f5a623; }
    .sub { font-size: 1.1rem; color: #888; max-width: 480px; margin: 0 auto 48px; line-height: 1.6; }
    .box { background: #111827; border: 1px solid #1f2937; border-radius: 16px; padding: 32px; max-width: 560px; margin: 0 auto; }
    .box label { font-size: 13px; color: #888; display: block; margin-bottom: 8px; }
    .input-row { display: flex; gap: 8px; }
    .input-row input { flex: 1; background: #0a0f1e; border: 1px solid #1f2937; color: #fff; font-size: 15px; padding: 12px 16px; border-radius: 10px; outline: none; }
    .input-row input:focus { border-color: #f5a623; }
    .input-row input::placeholder { color: #4b5563; }
    .btn { background: #f5a623; color: #000; font-size: 15px; font-weight: 600; padding: 12px 20px; border-radius: 10px; border: none; cursor: pointer; white-space: nowrap; }
    .result { display: none; margin-top: 24px; }
    .result-label { font-size: 12px; color: #888; margin-bottom: 8px; }
    .result-link { display: flex; gap: 8px; align-items: center; background: #0a0f1e; border: 1px solid #1f2937; border-radius: 10px; padding: 12px 16px; }
    .result-link span { flex: 1; font-size: 13px; color: #f5a623; word-break: break-all; font-family: monospace; }
    .copy-btn { background: #1f2937; color: #fff; border: none; padding: 8px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; white-space: nowrap; }
  </style>
</head>
<body>
<div class="hero">
  <div class="badge">🔗 Free Instagram Link Tool</div>
  <h1>Make your links open in <span>Safari & Chrome</span></h1>
  <p class="sub">Paste your URL. Get a smart link. Share on Instagram. Users land in their real browser.</p>
  <div class="box">
    <label>Your destination URL</label>
    <div class="input-row">
      <input type="url" id="urlInput" placeholder="https://yourwebsite.com" />
      <button class="btn" onclick="generate()">Get link</button>
    </div>
    <div class="result" id="result">
      <div class="result-label">Your smart Instagram link — share this instead of your direct URL</div>
      <div class="result-link">
        <span id="outputLink"></span>
        <button class="copy-btn" onclick="copy()">Copy</button>
      </div>
    </div>
  </div>
</div>
<script>
  function generate() {
    const input = document.getElementById('urlInput').value.trim();
    if (!input || !input.startsWith('http')) {
      alert('Please enter a valid URL starting with https://');
      return;
    }
    const link = window.location.origin + '/api/r?u=' + encodeURIComponent(input);
    document.getElementById('outputLink').textContent = link;
    document.getElementById('result').style.display = 'block';
  }
  function copy() {
    const link = document.getElementById('outputLink').textContent;
    navigator.clipboard.writeText(link).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 2000);
    });
  }
</script>
</body>
</html>
